name: Collect and Publish Data

on:
  schedule:
    - cron: '0 16 * * *'  # Runs daily at 16:00 UTC (18:00 CET / 20:00 CEST)
  workflow_dispatch:  # Allows manual triggering

# Serialize Pages deployments so a retrying deploy never races a later run.
# cancel-in-progress: false — never kill an in-flight data collection.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      with:
        fetch-depth: 0  # Fetch all history for all branches and tags
        token: ${{ secrets.PAT }}  # Personal Access Token (PAT) with repo scope

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directory
      run: mkdir -p data

    - name: Collect data
      env:
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        HMAC_KEY: ${{ secrets.HMAC_KEY }}
        ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        # GoogleWeatherCollector was disabled 2026-06-05 (replaced by
        # Open-Meteo). The secret is retained as a cold-revert option;
        # if Google Weather will not be revived, delete the secret from
        # the GH Actions secret store and this env line.
        GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}
        TENNET_API_KEY: ${{ secrets.TENNET_API_KEY }}
        NED_API_KEY: ${{ secrets.NED_API_KEY }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        GIE_API_KEY: ${{ secrets.GIE_API_KEY }}

      run: python data_fetcher.py

    # Soft tripwire: warn (don't fail) when an expected output JSON is missing.
    # Surfaces silent collector dropouts in the Actions run summary without
    # blocking publish — the hard gate is the next step. Always runs so we
    # still get visibility when a later step fails.
    - name: Verify expected output files
      if: always()
      run: |
        expected=(
          energy_price_forecast weather_forecast_multi_location weather_forecast_buurt
          grid_imbalance wind_forecast ned_production solar_forecast solar_forecast_buurt
          demand_weather_forecast air_quality_buurt cross_border_flows load_forecast
          generation_forecast generation_mix nordic_hydro calendar_features market_proxies
          market_history gas_storage gas_flows
        )
        missing=0
        for f in "${expected[@]}"; do
          if [ ! -f "data/${f}.json" ]; then
            echo "::warning::MISSING: data/${f}.json"
            missing=$((missing + 1))
          fi
        done
        present=$(( ${#expected[@]} - missing ))
        echo "Data completeness: ${present}/${#expected[@]} files present"

    # Defensive: fail the workflow loudly if data_quality_report flags any
    # dataset as `critical`. Added 2026-06-05 after the GoogleWeatherCollector
    # silent-failure incident (7 months of `API_KEY_INVALID` while the
    # workflow happily exited 0). Gate placed *before* the docs/commit/push
    # steps so degraded data is never published downstream.
    - name: Assert data quality (no silent failures)
      run: |
        if [ ! -f data/data_quality_report.json ]; then
          echo "::error::data/data_quality_report.json is missing — data_fetcher.py did not produce a quality report"
          exit 1
        fi
        status=$(jq -r '.overall_status // "missing"' data/data_quality_report.json)
        echo "data_quality_report.overall_status = $status"
        if [ "$status" = "critical" ]; then
          echo "::error::Aborting publish — overall_status is critical. Failing datasets:"
          jq '.dataset_reports[] | select(.status == "critical") | {dataset_name, status, issues}' data/data_quality_report.json
          exit 1
        fi

    # Schema-drift tripwire (#27 Layer A). Compares the new
    # data/_shape_signatures.json against the last committed version (HEAD,
    # which at this point is still the previous successful publish — we
    # haven't committed today's run yet). If a feed's shape changed but
    # CURRENT_SCHEMA_VERSION did not move, the next class of bug behind
    # PR #20 and #26 is happening — fail the workflow loudly.
    #
    # IMPORTANT: `--previous-ref HEAD` is intentional, not a typo for
    # HEAD~1. This step runs BEFORE the "Commit and push if changed" step
    # below, so HEAD at this point is still yesterday's daily commit.
    # The freshly-written sidecar in the working tree is "current". If
    # you move this step to run AFTER the commit (where HEAD becomes
    # today's commit), switch the flag to `--previous-ref HEAD~1`.
    #
    # Fail-mode: any within-feed shape drift without a CURRENT_SCHEMA_VERSION
    # bump aborts the run. Re-add --warn-only to re-enter the bedding-in
    # period if a new false-positive class emerges.
    #
    # `if: success()` (the default): the drift comparison is only meaningful
    # after a clean collection + quality gate. On a failed "Collect data" run
    # this step would otherwise diff the stale checked-out sidecar against
    # itself — benign but noisy. Unlike the completeness tripwire above, this
    # one has no diagnostic value on the failure path.
    - name: Schema-drift tripwire
      if: success()
      run: |
        python scripts/detect_schema_drift.py \
          --previous-ref HEAD

    - name: Prepare docs folder with only current data
      run: |
        mkdir -p docs
        # Copy files that exist, skip missing ones
        for file in energy_price_forecast.json weather_forecast_multi_location.json weather_forecast_buurt.json grid_imbalance.json wind_forecast.json ned_production.json solar_forecast.json solar_forecast_buurt.json demand_weather_forecast.json air_quality_buurt.json cross_border_flows.json load_forecast.json generation_forecast.json generation_mix.json nordic_hydro.json calendar_features.json market_proxies.json market_history.json gas_storage.json gas_flows.json; do
          if [ -f "data/$file" ]; then
            cp "data/$file" docs/
            echo "Copied $file"
          else
            echo "Skipping missing file: $file"
          fi
        done
        # Copy log files if they exist
        if ls data/*.log 1> /dev/null 2>&1; then
          cp data/*.log docs/
        fi

    # - name: List contents of data and docs directories
    #   run: |
    #     echo "Contents of data directory:"
    #     ls -la data/
    #     echo "Contents of docs directory:"
    #     ls -la docs/

    - name: Commit and push if changed
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add -f data/*.json docs/*.json
        git status
        git diff --staged --name-status
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update energy data" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}

    - name: Trigger dashboard rebuild
      run: |
        curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK }}
      continue-on-error: true

    # Package docs/ as the Pages artifact. Pages source is "GitHub Actions"
    # (switched from "Deploy from a branch" on 2026-07-06) so the deploy job
    # below can retry transient GitHub-side deploy failures — which the
    # auto-generated pages-build-deployment workflow could not.
    - name: Configure Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
      with:
        path: docs

  # Deploy the docs/ artifact to GitHub Pages with a bounded retry. The
  # actions/deploy-pages step occasionally returns "Deployment failed, try
  # again later." — a transient GitHub-side fault (observed 2026-07-05).
  # Three attempts, each a fresh deployment of the same artifact, with a
  # short backoff. environment.url takes whichever attempt succeeded.
  deploy:
    needs: collect-and-publish
    runs-on: ubuntu-latest
    permissions:
      pages: write       # deploy to Pages
      id-token: write     # OIDC token for deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages (attempt 1)
      id: d1
      continue-on-error: true
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
    - name: Backoff before attempt 2
      if: steps.d1.outcome == 'failure'
      run: sleep 60
    - name: Deploy to GitHub Pages (attempt 2)
      id: d2
      if: steps.d1.outcome == 'failure'
      continue-on-error: true
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
    - name: Backoff before attempt 3
      if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
      run: sleep 120
    - name: Deploy to GitHub Pages (attempt 3, final)
      id: d3
      if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

    # - name: Verify deployment
    #   run: |
    #     echo "Current directory:"
    #     pwd
    #     echo "Contents of current directory:"
    #     ls -la
    #     echo "Contents of docs directory:"
    #     ls -la docs/
