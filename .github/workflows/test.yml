name: Tests

on:
  push:
    branches: [ main, dev ]
    paths:
      - '*.py'
      - 'collectors/**'
      - 'utils/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Tests with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      env:
        # API keys for integration tests that need real APIs
        ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        METEO_API_KEY: ${{ secrets.METEO_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python -m pytest tests/ -v -m "not manual" --cov=utils --cov=collectors --cov-report=term --cov-report=xml

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
      with:
        # v5 skipped: it internally pinned github-script@v7 (node20); v6 uses
        # github-script@v8 (node24). The `file` -> `files` rename landed in v5.
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

    - name: Run critical timezone tests only
      run: |
        # --no-cov: the 20% --cov-fail-under gate in pytest.ini applies to
        # the FULL suite (run by the previous step). This filtered slice
        # runs ~19 timezone-marked tests; measuring global coverage off
        # those would always be near-zero and brittle to any small
        # uncovered addition. See email-noise incident after PR #16 merge.
        python -m pytest tests/ -v -m critical --no-cov

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check for syntax errors
      run: |
        python -m py_compile $(find . -name "*.py" -not -path "*/tests/*" -not -path "*/.venv/*" -not -path "*/venv/*")

    - name: Validate project structure
      run: |
        # Check that required files exist
        test -f pytest.ini || (echo "ERROR: pytest.ini missing" && exit 1)
        test -f requirements.txt || (echo "ERROR: requirements.txt missing" && exit 1)
        test -d tests/unit || (echo "ERROR: tests/unit directory missing" && exit 1)
        test -d tests/integration || (echo "ERROR: tests/integration directory missing" && exit 1)
        echo "✓ Project structure validated"
